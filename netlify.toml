# Netlify build + SPA routing config.
# The app uses client-side routing (React Router: /admin, /jobs/:id), so every
# path must fall back to index.html — otherwise a direct hit / refresh 404s.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
